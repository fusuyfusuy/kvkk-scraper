services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: file:/app/data/kvkk.db
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-kvkk@example.com}
      NOTIFICATION_RECIPIENTS: ${NOTIFICATION_RECIPIENTS:-admin@example.com}
      CRON_EXPRESSION: ${CRON_EXPRESSION:-0 * * * *}
      REFRESH_MODE: ${REFRESH_MODE:-DUPLICATES}
      REFRESH_MAX_PAGES: ${REFRESH_MAX_PAGES:-50}
      REFRESH_MAX_CONSECUTIVE_DUPLICATES: ${REFRESH_MAX_CONSECUTIVE_DUPLICATES:-5}
    volumes:
      - sqlite-data:/app/data
    depends_on:
      - mailpit
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    expose:
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

volumes:
  sqlite-data:
